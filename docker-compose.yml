version: "3.8"

services:
  mysql:
    image: mysql:8.4.8
    container_name: clawmanager-mysql
    restart: unless-stopped
    command: >
      bash -c "
        echo 'Checking for residual mysqld processes...' &&
        pkill -9 mysqld 2>/dev/null || true &&
        sleep 1 &&
        docker-entrypoint.sh mysqld
      "
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: clawmanager
      MYSQL_USER: clawreef
      MYSQL_PASSWORD: clawreef123
    volumes:
      - /mnt/Storage1/clawmanager/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - clawmanager-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: clawmanager-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /mnt/Storage1/clawmanager/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - clawmanager-net

  skill-scanner:
    image: ghcr.io/yuan-lab-llm/skill-scanner:latest
    container_name: clawmanager-skill-scanner
    restart: unless-stopped
    command: ["/opt/skill-scanner-venv/bin/skill-scanner-api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    networks:
      - clawmanager-net

  clawmanager:
    image: ghcr.io/yuan-lab-llm/clawmanager:latest
    container_name: clawmanager-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: clawreef
      DB_PASSWORD: clawreef123
      DB_NAME: clawmanager
      DB_ROOT_PASSWORD: root123
      OBJECT_STORAGE_ENDPOINT: minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_BUCKET: clawmanager
      OBJECT_STORAGE_USE_SSL: "false"
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      SKILL_SCANNER_ENABLED: "true"
      SKILL_SCANNER_BASE_URL: http://skill-scanner:8000
      K8S_MODE: outofcluster
      SERVER_ADDRESS: ":9001"
      GIN_MODE: release
    ports:
      - "30443:9001"
    networks:
      - clawmanager-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  clawmanager-net:
    driver: bridge
